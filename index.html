<!-- Widget de Chat IA -->
<div id="chat-widget" style="position: fixed; bottom: 20px; right: 20px; z-index: 999;">
  <!-- Botón flotante -->
  <button id="chat-toggle-btn" style="
    width: 60px; height: 60px; 
    background: #b76e4b; 
    border: none; 
    border-radius: 50%; 
    box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
    cursor: pointer; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    font-size: 24px;
    transition: all 0.3s;
  ">💬</button>

  <!-- Ventana del chat -->
  <div id="chat-window" style="
    display: none;
    position: absolute;
    bottom: 80px;
    right: 0;
    width: 350px;
    height: 500px;
    background: white;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    flex-direction: column;
    overflow: hidden;
  ">
    <div style="background: #2c2c2c; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center;">
      <div>
        <span style="font-weight: 600;">Sofía - Asistente IA</span>
        <div style="font-size: 12px; opacity: 0.8;">Cafetería Espresso</div>
      </div>
      <button id="close-chat" style="background: none; border: none; color: white; font-size: 20px; cursor: pointer;">✕</button>
    </div>
    
    <div id="chat-messages" style="flex: 1; overflow-y: auto; padding: 15px; background: #faf9f6;">
      <div style="background: #f0ece6; padding: 10px; border-radius: 10px; margin-bottom: 10px; max-width: 80%;">
        ¡Hola! Soy Sofía ☕ ¿En qué puedo ayudarte hoy?
      </div>
    </div>
    
    <div style="padding: 15px; border-top: 1px solid #e8e4df;">
      <div style="display: flex; gap: 10px;">
        <input 
          type="text" 
          id="chat-input" 
          placeholder="Escribe tu mensaje..." 
          style="flex: 1; padding: 10px; border: 1px solid #e0dcd5; border-radius: 20px; outline: none;"
        >
        <button id="send-btn" style="
          background: #b76e4b; 
          color: white; 
          border: none; 
          width: 40px; 
          height: 40px; 
          border-radius: 50%; 
          cursor: pointer;
        ">➤</button>
      </div>
    </div>
  </div>
</div>

<script>
  // Chat Widget Script
  const chatToggle = document.getElementById('chat-toggle-btn');
  const chatWindow = document.getElementById('chat-window');
  const closeBtn = document.getElementById('close-chat');
  const sendBtn = document.getElementById('send-btn');
  const chatInput = document.getElementById('chat-input');
  const chatMessages = document.getElementById('chat-messages');
  
  let chatHistory = [];
  let isOpen = false;

  chatToggle.addEventListener('click', () => {
    isOpen = !isOpen;
    chatWindow.style.display = isOpen ? 'flex' : 'none';
    chatToggle.textContent = isOpen ? '✕' : '💬';
    chatToggle.style.background = isOpen ? '#2c2c2c' : '#b76e4b';
  });

  closeBtn.addEventListener('click', () => {
    isOpen = false;
    chatWindow.style.display = 'none';
    chatToggle.textContent = '💬';
    chatToggle.style.background = '#b76e4b';
  });

  async function sendMessage() {
    const message = chatInput.value.trim();
    if (!message) return;

    // Agregar mensaje del usuario
    addMessage(message, 'user');
    chatInput.value = '';

    // Mostrar indicador de escritura
    const loadingDiv = document.createElement('div');
    loadingDiv.textContent = 'Sofía está escribiendo...';
    loadingDiv.style.cssText = 'color: #999; font-size: 0.9rem; padding: 5px;';
    chatMessages.appendChild(loadingDiv);
    chatMessages.scrollTop = chatMessages.scrollHeight;

    try {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 
          message,
          history: chatHistory 
        })
      });

      const data = await response.json();
      
      // Remover indicador de carga
      loadingDiv.remove();
      
      // Agregar respuesta
      addMessage(data.reply, 'assistant');
      
      // Actualizar historial
      chatHistory.push(
        { role: 'user', content: message },
        { role: 'assistant', content: data.reply }
      );
      
    } catch (error) {
      loadingDiv.remove();
      addMessage('Lo siento, no puedo responder ahora. Llámanos al 0414-285660 ☕', 'assistant');
    }
  }

  function addMessage(text, sender) {
    const messageDiv = document.createElement('div');
    messageDiv.textContent = text;
    messageDiv.style.cssText = `
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 10px;
      max-width: 80%;
      word-wrap: break-word;
      ${sender === 'user' 
        ? 'background: #b76e4b; color: white; margin-left: auto;' 
        : 'background: #f0ece6; color: #2c2c2c;'
      }
    `;
    chatMessages.appendChild(messageDiv);
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  sendBtn.addEventListener('click', sendMessage);
  chatInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') sendMessage();
  });
</script>
